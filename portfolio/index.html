<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI设计师作品集</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <!-- Main layout -->
    <div class="main-layout">
      <!-- Upper-left module - Personal Info -->
      <div class="personal-info">
        
        <!-- Left content -->
        <div class="personal-content">
          <div class="status-badge">
            <div class="status-dot"></div>
            <span>在职</span>
          </div>
          <h1>陈艺涵</h1>
          <h2>UI/UX 设计师 & 前端开发</h2>
          
          <p>
            专注于创造优雅、高效的数字产品体验。擅长将设计理念转化为高质量的前端代码，
            在界面设计、交互体验和技术实现之间建立完美的平衡。
          </p>
        </div>

        <!-- Browse button - bottom left -->
        <button class="browse-button">
          一键浏览
          <svg class="arrow-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <!-- Right portrait -->
        <div class="portrait">
          <img
            src="../src/imports/微信图片_20260413161812_30_9.png"
            alt="陈艺涵"
          />
        </div>
      </div>

      <!-- Upper-right module - Portfolio Grid -->
      <div class="portfolio-grid">

        <h3>作品集</h3>

        <div class="portfolio-content">
          <!-- Year timeline -->
          <div class="year-timeline">
            <div class="year active">2026</div>
            <div class="year">2025</div>
            <div class="year">2024</div>
          </div>

          <!-- Portfolio grid -->
          <div class="portfolio-images">
            <!-- Will be populated by JavaScript -->
          </div>
        </div>
      </div>

      <!-- Lower-left module - Professional Fields -->
      <div class="professional-fields">

        <h3>专业领域</h3>

        <div class="fields-content">
          <!-- Left side - Cards -->
          <div class="fields-cards">
            <!-- Will be populated by JavaScript -->
          </div>

          <!-- Right side - Project Image -->
          <div class="project-image">
            <img
              src="https://images.unsplash.com/photo-1558655146-d09347e92766?w=600"
              alt="项目展示"
            />
          </div>
        </div>

        <!-- Bottom info bar -->
        <div class="info-bar">
          <div class="info-left">
            <div class="info-dot"></div>
            <span>已完成项目</span>
          </div>
          <span class="project-count">24+</span>
        </div>
      </div>

      <!-- Lower-right module - Recent Activity -->
      <div class="recent-activity">

        <!-- Title -->
        <h3>最近干什么？</h3>

        <!-- Large Image -->
        <div class="activity-image">
          <img
            src="https://images.unsplash.com/photo-1558655146-d09347e92766?w=800"
            alt="最近作品"
          />
        </div>

        <!-- Text Content -->
        <div class="activity-content">
          <h4>设计系统重构</h4>
          <p>
            正在重构设计系统的组件库，优化响应式布局和暗色模式支持，提升整体用户体验。
          </p>
        </div>

        <!-- Bottom status bar -->
        <div class="status-bar">
          <div class="progress">
            <span>进度</span>
            <div class="progress-bar">
              <div class="progress-fill"></div>
            </div>
            <span>70%</span>
          </div>
          <span class="estimated-time">预计完成：5天</span>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
